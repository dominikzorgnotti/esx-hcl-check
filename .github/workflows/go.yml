# This workflow will build the esx-hcl-check golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: gofmt
      run: |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "These files are not gofmt-formatted:"; echo "$unformatted"; exit 1
        fi

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.64.8

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: go.mod

    - name: Download dependencies
      run: go mod download

    - name: Build
      run: |
        LDFLAGS="-X main.version=${{ github.ref_name }} -X main.commit=${GITHUB_SHA::7} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        go build -v -ldflags "${LDFLAGS}" -o esx-hcl-check .

    - name: Test
      run: go test -race -v ./...

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: esx-hcl-check-linux
        path: esx-hcl-check
        retention-days: 7
