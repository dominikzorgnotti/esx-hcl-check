# This workflow will build the esx-hcl-check golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'

    - name: Install dependencies
      run: |
        go mod init esx-hcl-check
        go mod tidy

    - name: Build
      run: go build -v -o esx-hcl-check .

    - name: Test
      run: go test -v ./...

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: esx-hcl-check-linux
        path: esx-hcl-check
        retention-days: 7
