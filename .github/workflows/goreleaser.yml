name: Build, Provenance & Release Binaries

# Builds each release binary inside the SLSA3 Go builder (a trusted, isolated
# builder) and attaches a signed provenance attestation alongside it, so a
# consumer can cryptographically verify the binary was built from this repo at
# this tag. Requires committed go.mod/go.sum (the builder cannot run go mod init).

on:
  release:
    types: [created]

permissions: read-all

jobs:
  # Compute the version metadata to stamp into the binary via ldflags.
  args:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ldflags.outputs.version }}
      commit: ${{ steps.ldflags.outputs.commit }}
      date: ${{ steps.ldflags.outputs.date }}
    steps:
      - id: ldflags
        run: |
          echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          echo "commit=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  # One trusted build + provenance per platform, uploaded to the release.
  build:
    needs: args
    permissions:
      id-token: write # keyless (OIDC) provenance signing
      contents: write # upload the binary and provenance to the release
      actions: read   # read workflow metadata for the provenance
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: windows
            arch: amd64
          - os: darwin
            arch: arm64
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@v2.1.0
    with:
      go-version-file: go.mod
      config-file: .slsa-goreleaser/${{ matrix.os }}-${{ matrix.arch }}.yml
      evaluated-envs: "VERSION:${{ needs.args.outputs.version }}, COMMIT:${{ needs.args.outputs.commit }}, DATE:${{ needs.args.outputs.date }}"
      upload-assets: true
      upload-tag-name: ${{ github.event.release.tag_name }}
