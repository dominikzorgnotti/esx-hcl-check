name: Build and Release Binaries

on:
  release:
    types: [created]

jobs:
  build-and-upload:
    name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for GitHub Actions to attach files to the release

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: darwin
            goarch: arm64
            ext: ""

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26' # Adjust to your current Go version if needed

    - name: Install dependencies
      run: |
        go mod init esx-hcl-check && go mod tidy

    - name: Build Binary
      run: |
        # Define the output name based on the OS and Architecture
        BINARY_NAME="esx-hcl-check-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"

        # Inject version metadata so the binary self-reports via -version
        LDFLAGS="-X main.version=${{ github.ref_name }} -X main.commit=${GITHUB_SHA::7} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

        # Build the code for the specific matrix target
        env GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -v -ldflags "${LDFLAGS}" -o $BINARY_NAME .

    - name: Generate SHA256 Hash
      run: |
        BINARY_NAME="esx-hcl-check-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
        
        # Calculate the hash and output it to a .sha256 text file
        sha256sum $BINARY_NAME > ${BINARY_NAME}.sha256

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          esx-hcl-check-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          esx-hcl-check-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}.sha256
